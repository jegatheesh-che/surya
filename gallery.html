<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Surya Photography</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        main: '#fd0053',
                        highlight: '#ffd716',
                        dark: '#2b2024',
                        light: '#ffffff',
                    },
                    fontFamily: {
                        display: ['"Camping Holiday"', 'serif'],
                        main: ['Erigo', 'sans-serif'],
                    },
                    letterSpacing: {
                        widest: '.25em',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="font-main font-light antialiased selection:bg-highlight selection:text-dark flex flex-col min-h-screen">

    <!-- Header -->
    <header class="fixed w-full z-50 bg-white/95 backdrop-blur-sm border-b border-dark/5 transition-all duration-300" id="header">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col items-center py-6">
                <!-- Logo -->
                <div class="text-center mb-6">
                    <a href="index.html" class="animate-logo font-main text-5xl md:text-7xl text-dark block uppercase transition-all duration-1000 group">
                        Surya <span class="animate-text-glow text-3xl md:text-4xl transition-colors duration-1000">Photography</span>
                    </a>
                </div>
                
                <!-- Desktop Menu -->
                <nav class="hidden md:flex space-x-12 text-[10px] uppercase tracking-widest font-medium text-dark/70">
                    <a href="index.html" class="nav-link hover:text-dark transition-colors">Home</a>
                    <a href="about.html" class="nav-link hover:text-dark transition-colors">About</a>
                    <a href="gallery.html" class="nav-link hover:text-dark transition-colors active">Gallery</a>
                    <a href="contact.html" class="nav-link hover:text-dark transition-colors">Contact</a>
                </nav>

                <div class="md:hidden absolute top-8 right-6">
                    <button id="mobile-menu-btn" class="text-dark hover:text-main focus:outline-none transition-colors"><i class="fas fa-bars text-xl"></i></button>
                </div>
            </div>
        </div>
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden bg-white border-t border-dark/5 absolute w-full shadow-lg">
            <div class="flex flex-col items-center py-6 space-y-6 text-[11px] uppercase tracking-widest font-medium text-dark/70">
                <a href="index.html" class="hover:text-main transition-colors">Home</a>
                <a href="about.html" class="hover:text-main transition-colors">About</a>
                <a href="gallery.html" class="hover:text-main transition-colors">Gallery</a>
                <a href="contact.html" class="hover:text-main transition-colors">Contact</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow pt-48 pb-24">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            
            <div class="mb-16 fade-up">
                <h1 class="font-display text-6xl md:text-8xl text-dark">Portfolio</h1>
            </div>

            <!-- Filters -->
            <div class="flex overflow-x-auto hide-scrollbar md:flex-wrap justify-start md:justify-center gap-4 px-2 mt-12 mb-20 fade-up py-4" id="gallery-filters">
                <button class="filter-btn active text-[10px] uppercase tracking-widest font-main" data-filter="all">All</button>
                <button class="filter-btn text-[10px] uppercase tracking-widest font-main" data-filter="weddings">Weddings</button>
                <button class="filter-btn text-[10px] uppercase tracking-widest font-main" data-filter="portraits">Portraits</button>
                <button class="filter-btn text-[10px] uppercase tracking-widest font-main" data-filter="events">Events</button>
                <button class="filter-btn text-[10px] uppercase tracking-widest font-main" data-filter="maternity">Maternity</button>
                <button class="filter-btn text-[10px] uppercase tracking-widest font-main" data-filter="lifestyle">Lifestyle</button>
            </div>
    <button id="select-mode-toggle" class="px-4 py-2 bg-main text-white rounded-md hover:bg-highlight transition-colors duration-200">Select</button>
            
            <!-- Gallery Grid -->
            <div class="grid grid-cols-2 md:grid-cols-4 auto-rows-[150px] md:auto-rows-[250px] gap-3 md:gap-4 px-2" id="gallery-grid">
                <!-- Javascript will populate this with bento items -->
            </div>
    <!-- Floating Action Bar -->
    <div id="selection-bar" class="hidden fixed bottom-8 right-8 bg-white/30 backdrop-blur-lg rounded-xl shadow-lg p-4 flex items-center space-x-3 z-50">
        <span id="selected-count" class="text-sm font-medium text-dark"></span>
        <button id="delete-selected" class="px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700">Delete Selected</button>
        <button id="move-category" class="px-3 py-1 bg-main text-white rounded hover:bg-highlight">Move to Category</button>
        <button id="select-all" class="px-3 py-1 bg-gray-600 text-white rounded hover:bg-gray-700">Select All</button>
        <button id="clear-selection" class="px-3 py-1 bg-gray-600 text-white rounded hover:bg-gray-700">Clear</button>
        <button id="cancel-selection" class="px-3 py-1 bg-gray-600 text-white rounded hover:bg-gray-700">Cancel</button>
    </div>
    <!-- Bulk Action Confirm Modal -->
    <div id="bulk-confirm-modal" class="fixed inset-0 bg-black/60 backdrop-blur-md hidden items-center justify-center z-[110] transition-opacity duration-300 opacity-0">
        <div class="glass-panel rounded-3xl p-6 w-full max-w-md text-center shadow-2xl border border-white/20 relative overflow-hidden">
            <div class="flex items-center justify-center mb-4">
                <i class="fas fa-exclamation-triangle text-4xl text-red-500"></i>
            </div>
            <h2 class="text-xl font-semibold mb-2">Delete <span id="bulk-delete-count"></span> images?</h2>
            <p class="mb-4 text-sm text-gray-700">These images will be permanently removed from Cloudinary and Firestore. This action cannot be undone.</p>
            <div class="flex justify-center space-x-4">
                <button id="bulk-cancel" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Cancel</button>
                <button id="bulk-confirm" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">Delete</button>
            </div>
        </div>
    </div>
    <!-- Progress Modal -->
    <div id="progress-modal" class="fixed inset-0 bg-black/60 backdrop-blur-md hidden items-center justify-center z-[120] transition-opacity duration-300 opacity-0">
        <div class="glass-panel rounded-3xl p-6 w-full max-w-md text-center shadow-2xl border border-white/20">
            <h3 class="text-lg font-medium mb-2" id="progress-title">Deleting Images</h3>
            <div class="w-full bg-gray-200 rounded-full h-2.5 mb-2">
                <div id="progress-bar" class="bg-main h-2.5 rounded-full" style="width:0%"></div>
            </div>
            <p id="progress-text" class="text-sm text-gray-800">0 / 0</p>
            <p id="progress-step" class="text-sm text-gray-600 mt-1"></p>
        </div>
    </div>

        </div>
    </main>

    <!-- Lightbox -->
    <div id="lightbox" class="fixed inset-0 z-[100] bg-white/95 backdrop-blur-md hidden flex justify-center items-center opacity-0 transition-opacity duration-500">
        <button id="lightbox-close" class="absolute top-8 right-8 text-dark/50 hover:text-main text-3xl font-light focus:outline-none transition-colors">&times;</button>
        <div class="max-h-[90vh] max-w-[90vw] relative shadow-2xl">
            <img id="lightbox-img" src="" alt="Fullscreen" class="max-h-[85vh] w-auto object-contain hidden">
            <video id="lightbox-video" class="max-h-[85vh] w-auto object-contain hidden" controls preload="none"></video>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-white border-t border-dark/5 pt-24 pb-12 mt-auto">
        <div class="max-w-4xl mx-auto px-4 text-center fade-up">
            <div class="flex justify-center items-center space-x-12 mb-16">
                <a href="https://www.instagram.com/collabwithsurya?igsh=bWg0N2hnZHMwbHFk&utm_source=qr" class="text-dark/50 hover:text-main transition-colors"><i class="fab fa-instagram text-xl"></i></a>
                <a href="mailto:Mail2suryacapturra@gmail.com" class="text-dark/50 hover:text-main transition-colors"><i class="far fa-envelope text-xl"></i></a>
                <a href="https://wa.me/14375997965" class="text-dark/50 hover:text-main transition-colors"><i class="fab fa-whatsapp text-xl"></i></a>
            </div>

            <div class="border-t border-dark/5 pt-8 text-[9px] uppercase tracking-[0.3em] text-dark/40 flex items-center justify-center space-x-4">
                <span>&copy; <script>document.write(new Date().getFullYear())</script> Surya Photography</span>
                <span class="w-1 h-1 rounded-full bg-highlight"></span>
                <span>All Rights Reserved</span>
            </div>
        </div>
    </footer>

    <!-- Floating Scroll Coin -->
    <div class="coin-container fixed bottom-8 right-8 w-20 h-20 md:w-24 md:h-24 z-50 rounded-full pointer-events-none drop-shadow-xl">
        <div class="coin-inner w-full h-full relative" id="scroll-coin">
            <div class="coin-face absolute inset-0 rounded-full overflow-hidden border-2 border-white">
                <img src="assets/images/logo1 (1).jpeg" alt="Surya Photography Logo Front" class="w-full h-full object-cover">
            </div>
            <div class="coin-face coin-back absolute inset-0 rounded-full overflow-hidden border-2 border-white">
                <img src="assets/images/logo1 (2).jpeg" alt="Surya Photography Logo Back" class="w-full h-full object-cover">
            </div>
        </div>
    </div>

    <!-- WhatsApp Sticky Button -->
    <a href="https://wa.me/14375997965?text=Hello%20Surya%20Photography,%20I%20would%20like%20to%20inquire%20about%20your%20services." target="_blank" class="fixed bottom-8 left-8 w-14 h-14 md:w-16 md:h-16 bg-[#25D366] text-white rounded-full flex items-center justify-center text-3xl shadow-[0_4px_10px_rgba(37,211,102,0.4)] hover:scale-110 hover:shadow-[0_8px_20px_rgba(37,211,102,0.6)] transition-all duration-300 z-50 group">
        <i class="fab fa-whatsapp"></i>
        <!-- Optional Tooltip -->
        <span class="absolute left-full ml-4 px-3 py-2 bg-white text-dark text-xs font-main tracking-widest uppercase rounded shadow opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">Chat with us</span>
    </a>

    
    <script src="js/animations.js" defer></script>
    <script src="js/main.js" defer></script>
    <script type="module" src="js/gallery.js" defer></script>
</body>
</html>
